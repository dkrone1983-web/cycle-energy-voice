workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    environment:
      android_sdk: default
      java: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true
        - pattern: master
          include: true
    scripts:
      - name: Build Debug APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
